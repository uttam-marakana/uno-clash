<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="100%" height="100%">
  <!-- Dark Matte Gaming Table Background -->
  <rect width="32" height="32" rx="6" fill="#15161a" stroke="#2a2d36" stroke-width="1"/>
  
  <!-- Card 1: The Underlying Warning (Yellow) -->
  <g transform="rotate(-20 12 18)">
    <rect x="4" y="6" width="14" height="20" rx="2" fill="#FFCC00" stroke="#FFFFFF" stroke-width="1"/>
    <circle cx="11" cy="16" r="4" fill="#FFFFFF" opacity="0.3"/>
  </g>
  
  <!-- Card 2: The Attack Card (Aggressive Red +2) -->
  <g transform="rotate(10 20 16)">
    <!-- Shadow to separate cards cleanly -->
    <rect x="12" y="5" width="15" height="21" rx="2.5" fill="#000000" opacity="0.4"/>
    <!-- Main Card Body -->
    <rect x="11" y="4" width="15" height="21" rx="2.5" fill="#E60012" stroke="#FFFFFF" stroke-width="1.2"/>
    <!-- Inner White Oval for crisp center contrast -->
    <ellipse cx="18.5" cy="14.5" rx="5.5" ry="7.5" fill="#FFFFFF" transform="rotate(-15 18.5 14.5)"/>
    
    <!-- Bold, readable "+2" Graphic -->
    <text x="18.5" y="18" 
          font-family="Arial Black, Impact, sans-serif" 
          font-size="10" 
          font-weight="900" 
          font-style="italic"
          text-anchor="middle" 
          fill="#E60012">
      +2
    </text>
  </g>
</svg>
